name: ci

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
  schedule:
    # Sonntag 03:00 UTC — long-running regression-gate (180s claude-bridge
    # heartbeat/lifecycle guard, sonst nur lokal via RUN_SLOW_TESTS=1 fix-
    # bar). Wenn der Job rot wird ist es fast immer ein Wrapper-Timeout-
    # Regression — Memory 569/577/578.
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Force Node-24 runtime for actions/* until they natively migrate from
# Node 20 (deprecated 2026-09-16). Removes the "Node.js 20 actions are
# deprecated" warning from every job until upstreams cut a new major.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  cli:
    name: cli ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    env:
      # PTY-tests (tests/sidecar/pty-chat-sessions.test.ts) spawnen
      # echte cmd.exe/sh-Subprocesses via node-pty. Auf macos-latest CI
      # runner liefert posix_spawnp ENOENT — wahrscheinlich weil
      # node-pty's prebuild-shipped `spawn-helper` Binary nach npm-ci
      # ohne exec-bit landet. Bis das durch eine echte chmod-Step
      # (im sidecar:build oder als CI-step) gefixed ist, gaten wir die
      # PTY-tests auf macos via `describe.skipIf(RUN_PTY_TESTS=='0')`.
      # Auf Linux + Windows laufen sie weiter ungated.
      RUN_PTY_TESTS: ${{ matrix.os == 'macos-latest' && '0' || '1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: install
        run: npm ci
      - name: biome ci
        run: npx biome ci .
      - name: typecheck
        run: npx tsc --noEmit
      - name: vitest
        run: npx vitest run --coverage

      # Phase Web-7 end-to-end smoke — verifies users-create / serve /
      # cookie-login / CSRF / logout against a real spawned server.
      # Linux only because the script uses POSIX bash idioms
      # (mktemp -d, trap, sleep) that are flaky under windows-bash on
      # github-actions.
      - name: web-7 multi-user smoke (linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: SKIP_BUILD=1 bash scripts/smoke-multi-user.sh

      - name: web-7 multi-user smoke — session persistence (linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: SKIP_BUILD=1 PERSIST=1 PORT=31425 bash scripts/smoke-multi-user.sh

  rust-shell:
    name: cargo check (gui/src-tauri)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: install linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            xdotool
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri -> target
      - name: install + build cli (sidecar source)
        run: |
          npm ci
          npm run build
      - name: build sidecar binary ($TARGET_TRIPLE)
        run: npm run sidecar:build
      - name: cargo check
        working-directory: gui/src-tauri
        run: cargo check --all-targets
      - name: cargo test
        working-directory: gui/src-tauri
        run: cargo test
      - name: cargo clippy
        working-directory: gui/src-tauri
        run: cargo clippy -- -D warnings

  cli-slow:
    # Long-running tests (z.B. claude-bridge 180s lifecycle guard) laufen
    # nur auf schedule oder manuellem workflow_dispatch — npm test bleibt
    # auf push/PR schnell. Single-OS (ubuntu) reicht: der Test prueft pure
    # Node-process-Mechanik, kein OS-spezifisches Verhalten.
    name: cli slow tests (nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    env:
      RUN_SLOW_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: install
        run: npm ci
      - name: vitest (slow)
        run: npx vitest run tests/domains/claude-bridge/long-running.test.ts
        timeout-minutes: 5

  gui-typecheck:
    name: gui typecheck + test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            gui/package-lock.json
      - name: install (root)
        run: npm ci
      - name: install (gui)
        working-directory: gui
        run: npm ci
      - name: gui typecheck
        working-directory: gui
        run: npx tsc -b
      - name: gui vitest
        working-directory: gui
        run: npm test
