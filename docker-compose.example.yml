# claude-os — example docker-compose for self-hosters.
#
# Reference setup: Proxmox VM running Debian 12 + Docker, accessed via
# Cloudflare DNS + nginx proxy manager on the same host. See
# docs/server-deployment.md for the full walkthrough.
#
# 1. Copy this file to docker-compose.yml
# 2. Create a .env file with at minimum:
#      CLAUDE_OS_AUTH_TOKEN=<openssl rand -hex 32>
#      CLAUDE_OS_SECRETS_PASSPHRASE=<openssl rand -hex 32>
# 3. docker compose pull && docker compose up -d
# 4. docker exec -it claude-os claude auth login  (one-time, persists in volume)
#
# Optional Multi-User Stage 2 (Email/Passwort-Login per ADR-0036):
#  a. Stop the container:   docker compose stop claude-os
#  b. Create the first admin (sql.js is single-writer — container MUST
#     be stopped):
#       docker compose run --rm claude-os \
#           node /app/dist/cli/index.js users create \
#               --email you@example.com --password 'long-passphrase-12+'
#  c. docker compose start claude-os  → Stage 2 auto-detected
#  d. Open https://<your-domain>/login and use the "Email + Passwort"-tab
#  e. Optional self-registration: uncomment CLAUDE_OS_ALLOW_REGISTRATION
#     below (DANGER: only behind Cloudflare Access / VPN / trusted network)

services:
  claude-os:
    # Use the prebuilt image:
    image: ghcr.io/iteenschmiede/claude-os:latest
    # …or build locally from the repo:
    # build: .
    container_name: claude-os
    restart: unless-stopped

    # Bind to all interfaces by default — reverse-proxy (nginx proxy
    # manager, Traefik, Caddy …) running on another VM/host can then
    # forward to this VM's LAN IP on :3000.
    #
    # If reverse-proxy and claude-os run on the SAME Docker host you
    # may prefer a stricter bind to localhost — change to
    # "127.0.0.1:3000:3000" then. Both halves end up behind the
    # bearer-token regardless.
    ports:
      - "3000:3000"

    environment:
      # REQUIRED — generate once: openssl rand -hex 32
      CLAUDE_OS_AUTH_TOKEN: "${CLAUDE_OS_AUTH_TOKEN:?CLAUDE_OS_AUTH_TOKEN must be set in .env}"

      # REQUIRED for EncryptedFileStore (headless secrets backend).
      # Generate: openssl rand -hex 32
      CLAUDE_OS_SECRETS_PASSPHRASE: "${CLAUDE_OS_SECRETS_PASSPHRASE:?CLAUDE_OS_SECRETS_PASSPHRASE must be set in .env}"

      # Optional — defaults are fine for most setups.
      CLAUDE_OS_LOG_LEVEL: "info"
      # PORT: 3000
      # HOST: "0.0.0.0"
      # CLAUDE_OS_VAULT_PATH: /data/vault
      # CLAUDE_OS_DATA_DIR: /data/config

      # --- Multi-User Stage 2 (Web-7, ADR-0036) ---
      # Stage 2 is auto-detected by the presence of users.sqlite in
      # CLAUDE_OS_DATA_DIR. Force it ON for self-registration-only
      # deployments where the file doesn't exist yet:
      # CLAUDE_OS_MULTI_USER: "1"
      #
      # Escape-hatch to force Stage 2 OFF (Stage-1 token-only fallback):
      # CLAUDE_OS_DISABLE_MULTI_USER: "1"
      #
      # Enable POST /api/auth/register (Self-Registration).
      # WARNUNG: only behind Cloudflare Access / VPN / trusted network —
      # otherwise brute-force + account-enumeration are trivial. Off by
      # default.
      # CLAUDE_OS_ALLOW_REGISTRATION: "1"
      #
      # Dev/Localhost only: drop the `Secure` flag on session cookies so
      # plain HTTP testing works. NEVER set this in production where you
      # terminate TLS upstream.
      # CLAUDE_OS_INSECURE_COOKIES: "1"

    volumes:
      # Vault + config + Anthropic auth all live in the same volume so
      # a single Proxmox snapshot + rsync backup covers everything.
      - claude-os-data:/data

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ----------------------------------------------------------------------
  # OPTIONAL: Cloudflare Tunnel (zero-trust deployment)
  # ----------------------------------------------------------------------
  # Uncomment and set CF_TUNNEL_TOKEN in .env to expose claude-os to the
  # internet WITHOUT opening any inbound ports on your OPNsense firewall.
  # Steps in Cloudflare Zero Trust:
  #   1. Networks → Tunnels → Create a tunnel → name it "claude-os"
  #   2. Copy the install token; set CF_TUNNEL_TOKEN=<token> in .env
  #   3. In the tunnel's "Public Hostname" tab, route your hostname
  #      (e.g. claude-os.yourdomain.tld) to http://claude-os:3000
  #
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: claude-os-cloudflared
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
  #   depends_on:
  #     - claude-os

volumes:
  claude-os-data:
    driver: local
